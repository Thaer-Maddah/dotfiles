# Hypridle configuration for AC power (less aggressive)
# Generated by hypridle-switch.sh

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = pidof hyprlock || hyprlock
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# Dim after 5 minutes
listener {
    timeout = 300
    on-timeout = brightnessctl -d nvidia_0 set 20%
    on-resume = brightnessctl -d nvidia_0 set 90%
}

# Blank after 10 minutes
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Lock after 15 minutes
listener {
    timeout = 900
    on-timeout = hyprlock
}

