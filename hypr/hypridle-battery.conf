# Hypridle configuration for battery-optimized sleep
# Screen blanks/turns off before suspend to handle s2idle (no S3 deep sleep)
# See: https://wiki.hyprland.org/Hypr-Ecosystem/hypridle/

general {
    # Lock the screen before sleep (avoids blank-screen-on-resume issues with s2idle)
    lock_cmd = pidof hyprlock || hyprlock
    # Before suspend: let the NVIDIA driver handle GPU state cleanly
    # (no dpms off — it interferes with VRAM preservation)
    before_sleep_cmd = pidof hyprlock || hyprlock
    # After resume: re-enable screens
    after_sleep_cmd = hyprctl dispatch dpms on
    # Ignore idle inhibition events from fullscreen apps (like mpv)
    ignore_dbus_inhibit = false
}

# === On battery (most aggressive) ===

# Dim the screen after 2 minutes on battery
listener {
    timeout = 120
    on-timeout = brightnessctl -d nvidia_0 set 15%
    on-resume = brightnessctl -d nvidia_0 set 90%
}

# Blank/DPMS-off after 3 minutes on battery
listener {
    timeout = 180
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Lock screen after 4 minutes on battery
listener {
    timeout = 240
    on-timeout = hyprlock
}

# Suspend after 8 minutes on battery
listener {
    timeout = 480
    on-timeout = systemctl suspend
}

# === On AC power (less aggressive, but still protects screen) ===

# Notify before dimming at 5 minutes
listener {
    timeout = 300
    on-timeout = notify-send -t 3000 "Screen will dim in 3 minutes"
}

# Dim after 8 minutes on AC
listener {
    timeout = 480
    on-timeout = brightnessctl -d nvidia_0 set 20%
    on-resume = brightnessctl -d nvidia_0 set 90%
}

# Blank after 10 minutes on AC
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Lock after 15 minutes on AC
listener {
    timeout = 900
    on-timeout = hyprlock
}


